<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جوجو حياتي ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }

        canvas#heartsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── HERO ── */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #hero h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 105, 135, 0.5), 0 4px 15px rgba(0,0,0,0.2);
            animation: titlePulse 3s ease-in-out infinite;
            line-height: 1.3;
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 300;
            margin-top: 15px;
            opacity: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .scroll-hint {
            margin-top: 50px;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            cursor: pointer;
            opacity: 0.7;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-8px); }
        }

        /* ── SECTION TITLES ── */
        section {
            padding: 60px 10px;
        }

        .section-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        /* ── LOVE LETTER ── */
        #love-letter {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 40px 30px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        #typewriter {
            font-size: clamp(1rem, 3vw, 1.4rem);
            line-height: 2;
            font-weight: 400;
            min-height: 120px;
        }

        #typewriter .cursor {
            display: inline-block;
            width: 3px;
            height: 1.4em;
            background: #fff;
            margin-right: 3px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── LOVE BUTTON ── */
        #love-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        #loveButton {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            padding: 20px 50px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757, #ff2d55);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 45, 85, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: buttonPulse 2s ease-in-out infinite;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            letter-spacing: 1px;
        }

        #loveButton:active {
            transform: scale(0.95);
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 8px 30px rgba(255, 45, 85, 0.4); transform: scale(1); }
            50% { box-shadow: 0 8px 50px rgba(255, 45, 85, 0.7); transform: scale(1.05); }
        }

        #loveCounter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            font-size: 1.8rem;
        }

        #loveCounter .heart-icon {
            transition: all 0.3s ease;
            cursor: default;
        }

        #loveCounter .heart-icon.filled {
            animation: heartPop 0.4s ease;
        }

        #loveCounter .heart-icon.empty {
            opacity: 0.25;
        }

        @keyframes heartPop {
            0% { transform: scale(0); }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .love-message {
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 2em;
            text-align: center;
            opacity: 0.9;
        }

        /* ── BURST HEARTS ── */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            z-index: 100;
            animation: burstAnim 1.2s ease-out forwards;
        }

        @keyframes burstAnim {
            0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); }
        }

        /* ── REASONS ── */
        #reasons {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 40px 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .reasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            max-width: 700px;
            margin: 0 auto;
        }

        .reason-card {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            position: relative;
        }

        .reason-card:hover {
            transform: translateY(-5px) scale(1.03);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .reason-card .front {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .reason-card .front .number {
            display: block;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        .reason-card .back {
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .reason-card.revealed .front {
            display: none;
        }

        .reason-card.revealed .back {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .reason-card.revealed {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ── MUSIC ── */
        #music {
            text-align: center;
            padding: 40px 10px;
        }

        #musicBtn {
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 35px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #musicBtn:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.7);
            transform: scale(1.05);
        }

        #musicBtn.playing {
            background: rgba(255,45,85,0.3);
            border-color: #ff4757;
        }

        #youtubePlayer {
            margin-top: 20px;
            max-width: 560px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            display: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        #youtubePlayer iframe {
            width: 100%;
            height: 315px;
            border: none;
        }

        #youtubePlayer.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        /* ── FLOATING MUSIC NOTE ── */
        .music-note {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 50;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .music-note:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .music-note.playing {
            animation: noteSpin 3s linear infinite;
            border-color: #ff4757;
        }

        @keyframes noteSpin {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 40px 10px 80px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .reasons-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .reason-card {
                min-height: 90px;
                padding: 18px 10px;
            }

            .reason-card .front {
                font-size: 0.95rem;
            }

            .reason-card .back {
                font-size: 0.85rem;
            }

            #love-letter {
                padding: 25px 18px;
            }

            #youtubePlayer iframe {
                height: 200px;
            }

            #loveButton {
                width: 90%;
                padding: 16px 20px;
            }
        }

        @media (max-width: 360px) {
            .reasons-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .reason-card {
                min-height: 80px;
                padding: 12px 8px;
            }
        }
        /* ── PASSWORD OVERLAY ── */
        #passwordOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
        }

        #passwordOverlay h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            color: #fff;
        }

        #passwordOverlay p {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 30px;
            color: #fff;
        }

        #passwordOverlay .lock-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        #passwordInput {
            font-family: 'Cairo', sans-serif;
            font-size: 1.2rem;
            padding: 14px 25px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-align: center;
            outline: none;
            width: 260px;
            max-width: 80vw;
            transition: border-color 0.3s;
            direction: ltr;
        }

        #passwordInput:focus {
            border-color: #ff4757;
        }

        #passwordInput::placeholder {
            color: rgba(255,255,255,0.4);
        }

        #passwordSubmit {
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px 40px;
            margin-top: 15px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #passwordSubmit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,45,85,0.4);
        }

        #passwordError {
            color: #ff6b6b;
            font-size: 0.95rem;
            margin-top: 12px;
            min-height: 1.5em;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #passwordError.show {
            opacity: 1;
        }

        .content {
            display: none;
        }

        .content.unlocked {
            display: block;
        }
    </style>
</head>
<body>

    <div id="passwordOverlay">
        <div class="lock-icon">🔒</div>
        <h2>موقع خاص</h2>
        <p>هذا الموقع خاص بمين يعرف الباسوورد فقط</p>
        <input type="password" id="passwordInput" placeholder="أدخل الباسوورد" autocomplete="off">
        <button id="passwordSubmit">دخول</button>
        <div id="passwordError"></div>
    </div>

    <canvas id="heartsCanvas"></canvas>

    <!-- Fixed Music Note (bottom left) -->
    <div class="music-note" id="musicNote">🎵</div>

    <div class="content">

        <!-- ─── HERO ─── -->
        <section id="hero">
            <h1>جوجو حياتي 🖤👑</h1>
            <p class="subtitle">لأميرتي الحلوة</p>
            <div class="scroll-hint" onclick="document.getElementById('love-letter').scrollIntoView({behavior:'smooth'})">👇</div>
        </section>

        <!-- ─── LOVE LETTER ─── -->
        <section id="love-letter">
            <div id="typewriter">
                <span class="cursor"></span>
            </div>
        </section>

        <!-- ─── LOVE BUTTON ─── -->
        <section id="love-action">
            <div class="section-title">🩷 حب حياتي 🩷</div>
                        <button id="loveButton">لمروجتي الحلوة 🖤👑</button>
            <div id="loveCounter"></div>
            <div class="love-message" id="loveMessage"></div>
        </section>

        <!-- ─── REASONS ─── -->
        <section id="reasons">
            <div class="section-title">✨ أسباب بحبك فيها ✨</div>
            <div class="reasons-grid" id="reasonsGrid"></div>
        </section>

        <!-- ─── MUSIC ─── -->
        <section id="music">
            <button id="musicBtn">🎵 شغّل أغنيتنا</button>
            <div id="youtubePlayer">
                <iframe src="https://www.youtube-nocookie.com/embed/AcTDlsUej2w?enablejsapi=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </section>

        <footer>
            دايماً بحبك 🖤👑
        </footer>

    </div>

    <script>
        // ──────────────────────────────────────────────
        // 1. HEARTS CANVAS
        // ──────────────────────────────────────────────
        const canvas = document.getElementById('heartsCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hearts = [];
        const MAX_HEARTS = 35;

        function createHeart(initial) {
            return {
                x: Math.random() * W,
                y: initial ? Math.random() * H : H + 20,
                size: 12 + Math.random() * 22,
                speed: 0.3 + Math.random() * 0.7,
                opacity: 0.3 + Math.random() * 0.5,
                sway: Math.random() * Math.PI * 2,
                swaySpeed: 0.005 + Math.random() * 0.01,
                swayAmplitude: 15 + Math.random() * 25,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.01,
                color: ['#ff6b6b','#ff4757','#ff2d55','#ff6b81','#ff9ff3','#f368e0'][Math.floor(Math.random() * 6)],
                emoji: ['❤️','🖤','💕','💖','👑','💗','💓','💞'][Math.floor(Math.random() * 8)]
            };
        }

        for (let i = 0; i < MAX_HEARTS; i++) {
            hearts.push(createHeart(true));
        }

        function drawHeart(x, y, size, rotation, opacity, color, emoji) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.globalAlpha = opacity;
            ctx.font = `${size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;
            ctx.fillText(emoji, 0, 0);
            ctx.restore();
        }

        function animateHearts() {
            ctx.clearRect(0, 0, W, H);

            for (const h of hearts) {
                h.y -= h.speed;
                h.sway += h.swaySpeed;
                h.rotation += h.rotSpeed;
                const swayX = Math.sin(h.sway) * h.swayAmplitude;

                if (h.y < -50) {
                    Object.assign(h, createHeart(false));
                    h.y = H + 20;
                }

                drawHeart(h.x + swayX, h.y, h.size, h.rotation, h.opacity, h.color, h.emoji);
            }

            requestAnimationFrame(animateHearts);
        }

        animateHearts();

        // ──────────────────────────────────────────────
        // 2. TYPEWRITER
        // ──────────────────────────────────────────────
        const typewriterEl = document.getElementById('typewriter');
        const fullText = 'جوجو حياتي، من أول يوم شفتك عرفت إنك أنتِ اللي كنت عمري ما بحلم إني ألقاها. أنتِ أجمل شي صار في حياتي، وكل يوم بكتشف إنو بحبك أكتر من أمس. ضحكتك بتنور دنيتي، ووجودك بخليني أحس إني أكمل إنسان. بحبك قد السما والأرض، وقد كل شي حلو بالدنيا. أنتِ حياتي وكل شي.';

        function startTypewriter() {
            let index = 0;
            const cursorSpan = typewriterEl.querySelector('.cursor');

            function type() {
                if (index < fullText.length) {
                    const textNode = document.createTextNode(fullText[index]);
                    typewriterEl.insertBefore(textNode, cursorSpan);
                    index++;
                    const delay = fullText[index - 1] === ' ' || fullText[index - 1] === '\n' ? 20 : 30 + Math.random() * 40;
                    setTimeout(type, delay);
                }
            }

            setTimeout(type, 800);
        }

        // Intersection Observer to start typewriter when visible
        const loveLetterSection = document.getElementById('love-letter');
        let typewriterStarted = false;

        const observer = new IntersectionObserver((entries) => {
            for (const entry of entries) {
                if (entry.isIntersecting && !typewriterStarted) {
                    typewriterStarted = true;
                    startTypewriter();
                    observer.disconnect();
                }
            }
        }, { threshold: 0.3 });

        observer.observe(loveLetterSection);

        // ──────────────────────────────────────────────
        // 3. LOVE BUTTON + HEARTS BURST
        // ──────────────────────────────────────────────
        const loveButton = document.getElementById('loveButton');
        const loveCounter = document.getElementById('loveCounter');
        const loveMessage = document.getElementById('loveMessage');
        let clickCount = 0;
        const TOTAL_LOVE = 10;

        const messages = [
            'بحبك 💕',
            'بحبك كتير 💖',
            'بحبك أوي 💗',
            'بحبك قد الدنيا 💓',
            'بحبك قد السما 💞',
            'بحبك قد كلشي 💝',
            'بحبك للابد ❤️',
            'بحبك كتير كتير 💘',
            'بحبك بجنون 💟',
            'بحبك قد الكون كله 👑❤️',
        ];

        function renderCounter() {
            loveCounter.innerHTML = '';
            for (let i = 0; i < TOTAL_LOVE; i++) {
                const span = document.createElement('span');
                span.className = 'heart-icon';
                span.textContent = '❤️';
                if (i < clickCount) {
                    span.classList.add('filled');
                } else {
                    span.classList.add('empty');
                }
                loveCounter.appendChild(span);
            }

            const msgIndex = Math.min(clickCount - 1, messages.length - 1);
            loveMessage.textContent = clickCount > 0 ? messages[msgIndex] : '';

            if (clickCount >= TOTAL_LOVE) {
                loveMessage.textContent = 'أنا موت فيك 🥹❤️👑';
            }
        }

        function burstHearts(x, y) {
            const emojis = ['❤️', '🖤', '👑', '💕', '💖', '💗', '💓', '💞', '💝', '💘', '💟', '🩷'];
            const count = 30 + Math.random() * 30;

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'burst-heart';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = x + 'px';
                el.style.top = y + 'px';

                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 100;
                const tr = (Math.random() - 0.5) * 720;

                el.style.setProperty('--tx', tx + 'px');
                el.style.setProperty('--ty', ty + 'px');
                el.style.setProperty('--tr', tr + 'deg');
                el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';

                document.body.appendChild(el);

                setTimeout(() => el.remove(), 1200);
            }
        }

        loveButton.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            clickCount = Math.min(clickCount + 1, TOTAL_LOVE);
            renderCounter();
            burstHearts(x, y);

            // Screen flash
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,45,85,0.15);pointer-events:none;z-index:99;animation:flashFade 0.5s ease forwards;';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 500);
        });

        // Style for flash
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `@keyframes flashFade { 0% { opacity: 1; } 100% { opacity: 0; } }`;
        document.head.appendChild(styleSheet);

        renderCounter();

        // ──────────────────────────────────────────────
        // 4. REASONS CARDS
        // ──────────────────────────────────────────────
        const reasons = [
            'عيونك الحلوة اللي بغرق فيهم كل ما شفتك',
            'ضحكتك اللي بتخليني أنسى هموم الدنيا كلها',
            'قلبك الطيب اللي ما في زيّه',
            'حنانك اللي بخليني أحس إنّي بأمان',
            'طريقة كلامك الحلوة اللي بتسرق قلبي',
            'خلّيتيني إنسان أحسن',
            'صبرك عليّ وفهمك ليّ دايمًا',
            'كل شي فيك... أنتِ ببساطة كل حياتي',
            'إنك دايماً بجنبي مهما صار',
            'طيبة قلبك وحبك الصادق',
        ];

        const grid = document.getElementById('reasonsGrid');

        reasons.forEach((reason, i) => {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.innerHTML = `
                <div class="front">
                    <span class="number">${i + 1}</span>
                    سبب حب
                </div>
                <div class="back">${reason}</div>
            `;
            card.addEventListener('click', function() {
                this.classList.toggle('revealed');
                // Add burst of tiny hearts on reveal
                if (this.classList.contains('revealed')) {
                    const rect = this.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    for (let j = 0; j < 8; j++) {
                        const el = document.createElement('div');
                        el.className = 'burst-heart';
                        el.textContent = '💖';
                        el.style.left = cx + 'px';
                        el.style.top = cy + 'px';
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 40 + Math.random() * 60;
                        el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                        el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                        el.style.setProperty('--tr', (Math.random() - 0.5) * 360 + 'deg');
                        el.style.fontSize = '0.8rem';
                        document.body.appendChild(el);
                        setTimeout(() => el.remove(), 1200);
                    }
                }
            });
            grid.appendChild(card);
        });

        // ──────────────────────────────────────────────
        // 5. MUSIC CONTROLS
        // ──────────────────────────────────────────────
        const musicBtn = document.getElementById('musicBtn');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const musicNote = document.getElementById('musicNote');
        let musicPlaying = false;

        function toggleMusic() {
            musicPlaying = !musicPlaying;
            if (musicPlaying) {
                youtubePlayer.classList.add('show');
                musicBtn.textContent = '⏸ إخفاء الأغنية';
                musicBtn.classList.add('playing');
                musicNote.classList.add('playing');
                if (window.innerWidth <= 480) {
                    setTimeout(() => {
                        youtubePlayer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
            } else {
                youtubePlayer.classList.remove('show');
                musicBtn.textContent = '🎵 شغّل أغنيتنا';
                musicBtn.classList.remove('playing');
                musicNote.classList.remove('playing');
            }
        }

        musicBtn.addEventListener('click', toggleMusic);
        musicNote.addEventListener('click', toggleMusic);

        // ──────────────────────────────────────────────
        // 6. PARALLAX / SCROLL EFFECT
        // ──────────────────────────────────────────────
        window.addEventListener('scroll', function() {
            const scrollY = window.scrollY;
            const hero = document.getElementById('hero');
            const heroH = hero.offsetHeight;
            if (scrollY < heroH) {
                hero.style.transform = `translateY(${scrollY * 0.3}px)`;
                hero.style.opacity = 1 - (scrollY / heroH) * 0.5;
            }
        });

        console.log('❤️ جوجو حياتي - كلشي الك ❤️');

        // ──────────────────────────────────────────────
        // 7. PASSWORD PROTECTION
        // ──────────────────────────────────────────────
        const PASSWORD = 'mmdmj';
        const overlay = document.getElementById('passwordOverlay');
        const passwordInput = document.getElementById('passwordInput');
        const passwordSubmit = document.getElementById('passwordSubmit');
        const passwordError = document.getElementById('passwordError');
        const mainContent = document.querySelector('.content');

        function checkPassword() {
            const entered = passwordInput.value.trim();
            if (entered.toLowerCase() === PASSWORD.toLowerCase()) {
                overlay.style.display = 'none';
                mainContent.classList.add('unlocked');
            } else {
                passwordError.textContent = '❌ الباسوورد غلط، حاول مرة تانية';
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                passwordInput.style.borderColor = '#ff4757';
                setTimeout(() => {
                    passwordInput.style.borderColor = 'rgba(255,255,255,0.3)';
                }, 2000);
            }
        }

        passwordSubmit.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
        passwordInput.focus();
    </script>
</body>
</html>
